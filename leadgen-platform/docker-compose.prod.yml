version: '3.8'

# Production override — extends docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  server:
    environment:
      - NODE_ENV=production
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  client:
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USER:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:-changeme}
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  redis:
    command: redis-stack-server --requirepass ${REDIS_PASSWORD:-changeme}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro   # SSL certificates from certbot
