version: '3.8'

services:
  # ── React Frontend ──────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: ../docker/Dockerfile.client
    ports:
      - "3000:3000"
    depends_on:
      - server
    restart: unless-stopped

  # ── Node.js Backend ─────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: ../docker/Dockerfile.server
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./server/whatsapp-sessions:/app/whatsapp-sessions
      - ./server/logs:/app/logs
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # ── Redis Stack (includes RedisBloom module for Bloom filter) ────────────────
  redis:
    image: redis/redis-stack:latest
    ports:
      - "6379:6379"
      - "8001:8001"   # RedisInsight web UI
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

volumes:
  mongo_data:
  redis_data:
